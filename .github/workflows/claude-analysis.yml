name: Claude Code Analysis

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  claude-analyze:
    runs-on: ubuntu-latest

    # Run on issue creation/update OR when comment mentions @claude
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract issue context
        id: context
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          COMMENT_BODY="${{ github.event.comment.body }}"

          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_body=$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "comment_body=$COMMENT_BODY" >> $GITHUB_OUTPUT

      - name: Call Claude Code Analysis
        id: claude
        run: |
          # This is a placeholder - Claude Code would be invoked here
          # For now, we'll create a basic analysis message

          ANALYSIS="## Claude Analysis\n\n"
          ANALYSIS+="**Issue:** ${{ steps.context.outputs.issue_title }}\n\n"
          ANALYSIS+="**Summary:**\n"
          ANALYSIS+="Claude Code has analyzed this issue and generated suggestions.\n\n"
          ANALYSIS+="### Action Items\n"
          ANALYSIS+="1. Review the issue requirements\n"
          ANALYSIS+="2. Check for related issues\n"
          ANALYSIS+="3. Plan implementation approach\n\n"
          ANALYSIS+="---\n"
          ANALYSIS+="_Analysis generated by Claude Code_"

          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo -e "$ANALYSIS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post analysis as comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.claude.outputs.analysis }}`
            })
