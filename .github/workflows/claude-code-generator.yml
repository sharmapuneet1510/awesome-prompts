name: Claude Code Generator

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  generate-code:
    runs-on: ubuntu-latest

    # Trigger: issue labeled with 'claude-generate' OR comment with @claude-generate
    if: |
      (github.event.action == 'labeled' && contains(github.event.label.name, 'claude-generate')) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-generate'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Extract issue details
        id: issue
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_body<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call Claude API for code generation
        id: generate
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cat > generate.js << 'EOF'
          const https = require('https');

          const issue = {
            title: `${{ steps.issue.outputs.issue_title }}`,
            body: `${{ steps.issue.outputs.issue_body }}`
          };

          const prompt = `You are a code generator. Based on this GitHub issue, generate production-ready code.

          Issue Title: ${issue.title}
          Issue Description: ${issue.body}

          Provide:
          1. Complete code implementation (JavaScript/TypeScript)
          2. Unit tests
          3. README with usage instructions

          Format your response as JSON with keys: "files" (array of {path, content}), "tests" (string), "instructions" (string)`;

          const data = JSON.stringify({
            model: "claude-opus-4-1",
            max_tokens: 4096,
            messages: [
              {
                role: "user",
                content: prompt
              }
            ]
          });

          const options = {
            hostname: 'api.anthropic.com',
            port: 443,
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': data.length,
              'x-api-key': process.env.CLAUDE_API_KEY,
              'anthropic-version': '2023-06-01'
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', (chunk) => { body += chunk; });
            res.on('end', () => {
              try {
                const response = JSON.parse(body);
                const content = response.content[0].text;
                console.log(content);
              } catch (e) {
                console.error('API Error:', e.message);
                process.exit(1);
              }
            });
          });

          req.on('error', (e) => {
            console.error('Request Error:', e.message);
            process.exit(1);
          });

          req.write(data);
          req.end();
          EOF

          node generate.js > response.json 2>&1
          cat response.json

      - name: Create generated files
        id: files
        run: |
          # Parse Claude response and create files
          # This is a simplified version - in production, you'd parse the JSON properly

          mkdir -p src tests

          cat > src/generated.js << 'EOF'
          // Generated by Claude Code
          // Issue: ${{ steps.issue.outputs.issue_title }}

          export const generatedFeature = {
            name: 'Generated Feature',
            description: 'Created from GitHub issue automation'
          };
          EOF

          cat > tests/generated.test.js << 'EOF'
          import { generatedFeature } from '../src/generated.js';

          describe('Generated Feature', () => {
            it('should have a name', () => {
              expect(generatedFeature.name).toBeDefined();
            });

            it('should have a description', () => {
              expect(generatedFeature.description).toBeDefined();
            });
          });
          EOF

          cat > README_GENERATED.md << 'EOF'
          # Generated Code

          Generated from GitHub Issue #${{ steps.issue.outputs.issue_number }}

          **Title:** ${{ steps.issue.outputs.issue_title }}

          ## Generated Files
          - `src/generated.js` - Main implementation
          - `tests/generated.test.js` - Unit tests

          ## Running Tests
          \`\`\`bash
          npm test
          \`\`\`
          EOF

          echo "Generated files created successfully"

      - name: Run tests
        id: test
        continue-on-error: true
        run: |
          npm test 2>&1 | tee test-results.txt
          echo "tests_passed=$?" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@anthropic.com"

      - name: Create feature branch
        run: |
          BRANCH_NAME="claude-generate/issue-${{ steps.issue.outputs.issue_number }}"
          git checkout -b $BRANCH_NAME
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Commit generated code
        run: |
          git add -A
          git commit -m "feat: Generated code from issue #${{ steps.issue.outputs.issue_number }}

          Generated by Claude Code automation
          Issue: ${{ steps.issue.outputs.issue_title }}"

      - name: Push branch
        run: |
          git push origin ${{ env.BRANCH_NAME }}

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Generated: ${{ steps.issue.outputs.issue_title }}`,
              body: `## Generated Code

              Auto-generated from GitHub issue #${{ steps.issue.outputs.issue_number }}

              **Original Issue:** ${{ steps.issue.outputs.issue_title }}

              ### Generated Files
              - src/generated.js
              - tests/generated.test.js
              - README_GENERATED.md

              ### Test Status
              Tests: ${{ steps.test.outputs.tests_passed == '0' && '✅ Passed' || '⚠️ Review needed' }}

              ---
              _Generated by Claude Code Automation_`,
              head: `${{ env.BRANCH_NAME }}`,
              base: 'main'
            });

            console.log(`Pull request created: ${pr.html_url}`);

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Claude Code Generation Complete**

              I've generated code for this issue and created a pull request.

              **What was generated:**
              - Implementation code in \`src/generated.js\`
              - Unit tests in \`tests/generated.test.js\`
              - Documentation in \`README_GENERATED.md\`

              **Next steps:**
              1. Review the pull request
              2. Run tests locally: \`npm test\`
              3. Approve and merge when ready

              [View Pull Request](https://github.com/${{ github.repository }}/pull/${{ github.run_number }})`
            });
